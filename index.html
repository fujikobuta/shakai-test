<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>社会テストアプリ</title>
    <!-- Google Fonts: M PLUS Rounded 1c -->
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <!-- SheetJS (xlsx.js) CDN -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary-bg: #fffbf0;
            --accent-color: #ff9800;
            --text-color: #4a4a4a;
            --maru-color: #4caf50;
            --batsu-color: #f44336;
            --back-color: #9e9e9e;
            --btn-shadow: 0 4px 0 #e68a00;
            --maru-shadow: 0 4px 0 #388e3c;
            --batsu-shadow: 0 4px 0 #d32f2f;
            --back-shadow: 0 4px 0 #757575;
        }

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            box-sizing: border-box;
            user-select: none;
        }

        h1 {
            color: var(--accent-color);
            margin: 10px 0;
            font-size: 1.5rem;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .screen.active {
            display: flex;
        }

        /* Screen 1: Upload */
        #upload-btn-label {
            background: white;
            border: 3px dashed var(--accent-color);
            padding: 40px 20px;
            border-radius: 20px;
            cursor: pointer;
            width: 80%;
            max-width: 400px;
            font-size: 1.2rem;
            color: var(--accent-color);
            font-weight: bold;
        }

        input[type="file"] {
            display: none;
        }

        /* Screen 2: Quiz */
        #progress {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #888;
        }

        #question-box {
            background: white;
            width: 90%;
            max-width: 500px;
            min-height: 200px;
            border-radius: 25px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            box-sizing: border-box;
            margin-bottom: 30px;
            border: 4px solid #f0f0f0;
            position: relative;
        }

        #question-text {
            font-size: 2.5rem;
            font-weight: bold;
            line-height: 1.4;
            word-break: normal;
            overflow-wrap: anywhere;
        }

        #answer-box {
            font-size: 3.5rem;
            color: var(--accent-color);
            margin-bottom: 30px;
            font-weight: bold;
            min-height: 5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .big-btn {
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s;
            width: 80%;
            max-width: 300px;
        }

        .big-btn:active {
            transform: translateY(4px);
        }

        #check-btn {
            background-color: var(--accent-color);
            color: white;
            box-shadow: var(--btn-shadow);
            height: 70px;
        }

        .judge-btns {
            display: none;
            gap: 20px;
            width: 100%;
            justify-content: center;
        }

        .judge-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: none;
            font-size: 3rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-sizing: border-box;
        }

        #maru-btn {
            background-color: var(--maru-color);
            box-shadow: var(--maru-shadow);
        }

        #batsu-btn {
            background-color: var(--batsu-color);
            box-shadow: var(--batsu-shadow);
        }

        .secondary-btn {
            margin-top: 30px;
            background: none;
            border: none;
            color: #888;
            font-size: 1.1rem;
            text-decoration: underline;
            cursor: pointer;
            padding: 10px;
        }

        /* Screen 3: Result */
        #result-area {
            width: 100%;
            flex-grow: 1;
            background: white;
            margin: 20px 0;
            padding: 15px;
            border-radius: 15px;
            overflow-y: auto;
            text-align: left;
            font-family: monospace;
            white-space: pre-wrap;
            border: 1px solid #ddd;
            font-size: 1.1rem;
        }

        .bottom-nav {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }

        #line-btn {
            background-color: #06c755;
            color: white;
            width: 100%;
            height: 70px;
            border: none;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 4px 0 #05a546;
        }

        /* Modal for Resume */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 80%;
            max-width: 400px;
            text-align: center;
        }

        .modal-btns {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 15px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        #resume-yes {
            background: var(--accent-color);
            color: white;
        }

        #resume-no {
            background: #eee;
            color: #444;
        }

        /* Practice mode */
        #practice-answer-box {
            font-size: 3rem;
            color: var(--accent-color);
            font-weight: bold;
            margin-bottom: 10px;
            display: none;
        }

        #practice-explanation-box {
            font-size: 1rem;
            color: #666;
            background: #f9f9f9;
            border-radius: 10px;
            padding: 10px 16px;
            margin-bottom: 16px;
            width: 90%;
            max-width: 500px;
            box-sizing: border-box;
            display: none;
            text-align: left;
            line-height: 1.5;
        }

        #practice-btn {
            background-color: #9c27b0;
            color: white;
            box-shadow: 0 4px 0 #6a1b7a;
            height: 70px;
        }

        /* Animation */
        .fade-in {
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <!-- Screen 1: File Selection -->
    <div id="screen-upload" class="screen active">
        <h1>社会テストアプリ</h1>
        <p>Excelファイルをえらんでね！</p>
        <p style="font-size: 0.8rem; color: #888;">「予定表」シートを読み込みます</p>
        <label id="upload-btn-label" for="file-input">
            📄 ファイルをアップロード
        </label>
        <input type="file" id="file-input" accept=".xlsx">
    </div>

    <!-- Screen 2: Quiz -->
    <div id="screen-quiz" class="screen">
        <div id="progress">0 / 0</div>
        <div id="question-box">
            <div id="question-text">読み込み中...</div>
        </div>

        <div id="answer-box"></div>

        <!-- 練習モード用：即時表示の解答と解説 -->
        <div id="practice-answer-box"></div>
        <div id="practice-explanation-box"></div>

        <button id="check-btn" class="big-btn">答えあわせ</button>
        <button id="practice-btn" class="big-btn" style="display:none;">練習しました</button>

        <div class="judge-btns" id="judge-container">
            <button id="maru-btn" class="judge-btn">○</button>
            <button id="batsu-btn" class="judge-btn">×</button>
        </div>

        <button id="back-btn" class="secondary-btn" style="display: none;">◀ ひとつ前にもどる</button>
    </div>

    <!-- Screen 3: Result -->
    <div id="screen-result" class="screen">
        <h1>テストおつかれさま！</h1>
        <div id="result-area"></div>
        <div class="bottom-nav">
            <button id="line-btn">結果をコピーしてLINEで送る</button>
            <button id="restart-btn" class="secondary-btn" style="width: 100%;">最初からやりなおす</button>
        </div>
    </div>

    <!-- Resume Modal -->
    <div id="resume-modal" class="modal-overlay">
        <div class="modal">
            <h3>前回のつづきがあるよ！</h3>
            <p>とちゅうから はじめる？</p>
            <div class="modal-btns">
                <button id="resume-no" class="modal-btn">最初から</button>
                <button id="resume-yes" class="modal-btn">つづきから</button>
            </div>
        </div>
    </div>

    <script>
        // QUESTIONS_DATA_START
        const embeddedQuestions = [{"q": "豪族たちをまとめて大和政権を成立させた、最高権力者を何といいますか。", "n": 1, "a": "大王", "l": "", "practice": true, "p": 1}, {"q": "大和政権の政治のしくみで、家柄に応じて職位を与える政治のしくみを何といいますか。", "n": 2, "a": "氏姓制度", "l": "", "practice": true, "p": 1}, {"q": "倭の五王の一人といわれる王の名前が刻まれた鉄剣が出土した、埼玉県にある古墳を答えなさい。", "n": 3, "a": "稲荷山古墳", "l": "", "practice": true, "p": 1}, {"q": "現在の礼儀作法のもととなった、中国の孔子によって開かれた宗教を何といいますか。", "n": 4, "a": "儒教", "l": "", "practice": true, "p": 1}, {"q": "大陸から伝わった宗教を日本に受け入れるかどうかで、豪族の物部氏と激しく対立した豪族は何氏ですか。", "n": 5, "a": "蘇我氏", "l": "", "practice": true, "p": 1}, {"q": "蘇我氏を滅ぼし、後に天皇となった人物はだれですか。", "n": 6, "a": "中大兄皇子", "l": "", "practice": true, "p": 1}, {"q": "日本の旧石器文化の研究のきっかけとなった、群馬県の遺跡を答えなさい。", "n": 7, "a": "岩宿遺跡", "l": "", "practice": false, "p": 1}, {"q": "蘇我氏を滅ぼし、唐の進んだ制度を取り入れた政治の改革を何といいますか。", "n": 8, "a": "大化の改新", "l": "", "practice": false, "p": 1}, {"q": "663年に朝廷が百済と協力して戦った結果、唐・新羅の連合軍に敗れた戦いを何といいますか。", "n": 9, "a": "白村江の戦い", "l": "", "practice": false, "p": 1}, {"q": "672年の天皇の後継ぎをめぐる、天皇の息子と天皇の弟との争いを何といいますか。", "n": 10, "a": "壬申の乱", "l": "", "practice": false, "p": 1}, {"q": "672年に天皇の後継ぎをめぐり争った、天皇の弟の名前を答えなさい。", "n": 11, "a": "大海人皇子", "l": "", "practice": false, "p": 1}, {"q": "672年に起きた争いに勝利した人物は、即位して何天皇になりましたか。", "n": 12, "a": "天武天皇", "l": "", "practice": false, "p": 1}, {"q": "薬師寺東塔などに代表される、唐の初期の影響を受けた活気あふれる文化を何文化といいますか。", "n": 13, "a": "白鳳文化", "l": "", "practice": false, "p": 1}, {"q": "キトラ古墳と同じ時期につくられた古墳で、壁画が確認された古墳を何古墳といいますか。", "n": 14, "a": "高松塚古墳", "l": "", "practice": false, "p": 1}, {"q": "1999年に飛鳥池古墳から出土した、日本最古のものともいわれる貨幣を何といいますか。", "n": 15, "a": "富本銭", "l": "", "practice": false, "p": 1}, {"q": "701年に文武天皇が、唐の律令を参考に定めたきまりを何といいますか。", "n": 16, "a": "大宝律令", "l": "", "practice": false, "p": 1}, {"q": "701年に定められたきまりで、国の長として任命された役人を何といいますか。", "n": 17, "a": "国司", "l": "", "practice": false, "p": 1}, {"q": "6歳以上の民衆に田を分け与え、死ぬと国に返させる制度を何といいますか。", "n": 18, "a": "班田収授法", "l": "", "practice": false, "p": 1}, {"q": "701年に定められたきまりによって、民衆に分け与えられた土地を何といいますか。", "n": 19, "a": "口分田", "l": "", "practice": false, "p": 1}, {"q": "収穫した稲の３％を納める税", "n": 20, "a": "①租", "l": "", "practice": false, "p": 1}, {"q": "都で10日間働くかわりに布を納める税", "n": 21, "a": "②庸", "l": "", "practice": false, "p": 1}, {"q": "地方の特産物を納める税", "n": 22, "a": "③調", "l": "", "practice": false, "p": 1}, {"q": "成人した男子が、北九州の守りに3年間つくことを何といいますか。", "n": 23, "a": "防人", "l": "", "practice": false, "p": 1}, {"q": "701年に定められたきまりをつくった、蘇我氏を滅ぼした人物の子はだれですか。", "n": 24, "a": "藤原不比等", "l": "", "practice": false, "p": 1}, {"q": "710年に元明天皇が、唐の都をモデルにつくらせた都を何といいますか。", "n": 25, "a": "平城京", "l": "", "practice": false, "p": 1}, {"q": "唐の都を何といいますか。当時のよび方で答えなさい。", "n": 26, "a": "長安", "l": "", "practice": false, "p": 1}, {"q": "710年に完成した都の跡地から出土した、さまざまな記録が記された木の札を何といいますか。", "n": 27, "a": "木簡", "l": "", "practice": false, "p": 1}, {"q": "奈良時代の苦しい農民の暮らしを「貧窮問答歌」によんだのはだれですか。", "n": 28, "a": "山上憶良", "l": "", "practice": false, "p": 1}, {"q": "723年に定められた、土地に関する法律を何といいますか。", "n": 29, "a": "三世一身の法", "l": "", "practice": false, "p": 1}, {"q": "743年に定められた、自分で開墾した土地を永久に使用してよいことを認めた法律を何といいますか。", "n": 30, "a": "墾田永年私財法", "l": "", "practice": false, "p": 1}, {"q": "743年に定められた法律によって急速に増えた、貴族や寺社の私有地を何といいますか。", "n": 31, "a": "荘園", "l": "", "practice": false, "p": 1}, {"q": "唐の文化や制度を取り入れるために、朝廷が中国に派遣した使者のことを何といいますか。", "n": 32, "a": "遣唐使", "l": "", "practice": false, "p": 1}, {"q": "初めて唐に朝廷の使者として遣わされた人物はだれですか。", "n": 33, "a": "犬上御田鍬", "l": "", "practice": false, "p": 1}, {"q": "留学生として中国にわたって皇帝につかえ、帰国できずに唐で生涯を終えた人物はだれですか。", "n": 34, "a": "阿倍仲麻呂", "l": "", "practice": false, "p": 1}, {"q": "何度かの失敗の末、ようやく日本に渡ることに成功し、唐招提寺を建てた唐の高僧はだれですか。", "n": 35, "a": "鑑真", "l": "", "practice": false, "p": 1}, {"q": "仏教の力で国を治めようとして、国ごとに国分寺・国分尼寺を建てるよう命じた天皇はだれですか。", "n": 36, "a": "聖武天皇", "l": "", "practice": false, "p": 1}, {"q": "仏教の力で国を治めようとした天皇が、都に総国分寺として建てさせた寺を何といいますか。", "n": 37, "a": "東大寺", "l": "", "practice": false, "p": 1}, {"q": "総国分寺にある、天皇が使用していた宝物や文物が保管されていた倉庫を何といいますか。", "n": 38, "a": "正倉院", "l": "", "practice": false, "p": 1}, {"q": "総国分寺にある、天皇の遺品を収めた倉庫の建築様式を何といいますか。", "n": 39, "a": "校倉造", "l": "", "practice": false, "p": 1}, {"q": "奈良時代中期の、唐の強い影響を受けた仏教文化を何文化といいますか。", "n": 40, "a": "天平文化", "l": "", "practice": false, "p": 1}, {"q": "橋や道路づくりを行い民衆から慕われ、大仏づくりにも協力した僧はだれですか。", "n": 41, "a": "行基", "l": "", "practice": false, "p": 1}, {"q": "712年に完成した、太安万侶がまとめた日本最古の歴史書を何といいますか。", "n": 42, "a": "古事記", "l": "", "practice": false, "p": 1}, {"q": "720年に舎人親王を中心として完成した日本の歴史書を何といいますか。", "n": 43, "a": "日本書紀", "l": "", "practice": false, "p": 1}, {"q": "朝廷が地方の国司に、その土地の様子や産物などをまとめさせた書物を何といいますか。", "n": 44, "a": "風土記", "l": "", "practice": false, "p": 1}, {"q": "約4500首の歌がおさめられた、日本最古の和歌集を何といいますか。", "n": 45, "a": "万葉集", "l": "", "practice": false, "p": 1}, {"q": "794年に都を平安京にうつした天皇はだれですか。", "n": 46, "a": "桓武天皇", "l": "", "practice": false, "p": 1}, {"q": "平安時代の初めに、東北の蝦夷を平定するため、征夷大将軍に任命されたのはだれですか。", "n": 47, "a": "坂上田村麻呂", "l": "", "practice": false, "p": 1}, {"q": "唐から帰り、天台宗を開いた僧の名前を答えなさい。", "n": 48, "a": "最澄", "l": "", "practice": false, "p": 1}, {"q": "唐から帰り、真言宗を開いた僧の名前を答えなさい。", "n": 49, "a": "空海", "l": "", "practice": false, "p": 1}, {"q": "藤原氏が行っていた、娘を天皇のきさきにして、実権を握った政治を何といいますか。", "n": 50, "a": "摂関政治", "l": "", "practice": false, "p": 1}, {"q": "「この世をば わが世とぞおもふ 望月の かけたることも なしと思へば」という歌をよんだ人物はだれですか。", "n": 51, "a": "藤原道長", "l": "", "practice": false, "p": 1}, {"q": "藤原氏の全盛期を築いた父子のうち、阿弥陀堂を建てた子の名前を答えなさい。", "n": 52, "a": "藤原頼通", "l": "", "practice": false, "p": 1}, {"q": "藤原氏などの貴族が持っていた、税を払わなくてよい権利を何といいますか。", "n": 53, "a": "不輸の権", "l": "", "practice": false, "p": 1}, {"q": "藤原氏などの貴族が持っていた、役人の立ち入りを断る権利を何といいますか。", "n": 54, "a": "不入の権", "l": "", "practice": false, "p": 1}, {"q": "1086年に、子どもに天皇の位を譲り、自らは上皇として政治を行った人物はだれですか。", "n": 55, "a": "白河上皇", "l": "", "practice": false, "p": 1}, {"q": "上皇として行う政治を何といいますか。", "n": 56, "a": "院政", "l": "", "practice": false, "p": 1}, {"q": "935年に、関東で反乱を起こし、「新皇」と名のった武士はだれですか。", "n": 57, "a": "平将門", "l": "", "practice": false, "p": 1}, {"q": "939年に、瀬戸内海で反乱を起こした海賊はだれですか。", "n": 58, "a": "藤原純友", "l": "", "practice": false, "p": 1}, {"q": "1156年におきた天皇と上皇の争いを何といいますか。", "n": 59, "a": "保元の乱", "l": "", "practice": false, "p": 1}, {"q": "1159年におきた源氏と平氏の争いを何といいますか。", "n": 60, "a": "平治の乱", "l": "", "practice": false, "p": 1}, {"q": "1167年に朝廷から、武士としてはじめて太政大臣に任じられた人物はだれですか。", "n": 61, "a": "平清盛", "l": "", "practice": false, "p": 1}];
        // QUESTIONS_DATA_END

        let questions = [];
        let currentIndex = 0;
        let results = [];

        const STORAGE_KEY = 'kanji_test_progress';

        const fileInput = document.getElementById('file-input');
        const screenUpload = document.getElementById('screen-upload');
        const screenQuiz = document.getElementById('screen-quiz');
        const screenResult = document.getElementById('screen-result');

        const questionText = document.getElementById('question-text');
        const answerBox = document.getElementById('answer-box');
        const checkBtn = document.getElementById('check-btn');
        const practiceBtn = document.getElementById('practice-btn');
        const practiceAnswerBox = document.getElementById('practice-answer-box');
        const practiceExplanationBox = document.getElementById('practice-explanation-box');
        const backBtn = document.getElementById('back-btn');
        const judgeContainer = document.getElementById('judge-container');
        const progressText = document.getElementById('progress');
        const resultArea = document.getElementById('result-area');
        const resumeModal = document.getElementById('resume-modal');

        // Initial check for embedded data
        window.addEventListener('DOMContentLoaded', () => {
            console.log("Check embedded questions...");
            if (typeof embeddedQuestions !== 'undefined' && embeddedQuestions && Array.isArray(embeddedQuestions) && embeddedQuestions.length > 0) {
                console.log("Found embedded questions:", embeddedQuestions.length);
                questions = embeddedQuestions;
                checkResume();
            } else {
                console.log("No embedded questions found.");
            }
        });

        function checkResume() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const progress = JSON.parse(saved);
                    if (progress.total === questions.length && progress.index > 0) {
                        resumeModal.style.display = 'flex';
                        document.getElementById('resume-yes').onclick = () => {
                            currentIndex = progress.index;
                            results = progress.results;
                            resumeModal.style.display = 'none';
                            startQuiz(false);
                        };
                        document.getElementById('resume-no').onclick = () => {
                            clearProgress();
                            resumeModal.style.display = 'none';
                            startQuiz(true);
                        };
                        return;
                    }
                } catch (e) {
                    console.error("Resume error:", e);
                    clearProgress ();
                 }
            }
            startQuiz(true);
        }

         function  saveProgress() {
            const state = {
                index: currentIndex,
                results: results,
                total: questions.length
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function clearProgress() {
            localStorage.removeItem(STORAGE_KEY);
        }

        // RGB Color Priority logic
        function getColorPriority(cell) {
            if (!cell || !cell.s || !cell.s.fgColor || !cell.s.fgColor.rgb) return 5;
            let rgb = cell.s.fgColor.rgb;
            if (rgb.length > 6) rgb = rgb.slice(-6);
            if (rgb.length !== 6) return 5;
            let r = parseInt(rgb.substring(0, 2), 16), g = parseInt(rgb.substring(2, 4), 16), b = parseInt(rgb.substring(4, 6), 16);
            if (r >= 180 && g < 100 && b < 100) return 1;
            if (r >= 180 && g >= 180 && b < 100) return 2;
            if (g >= 150 && r < 150 && b < 150) return 3;
            if (b >= 150 && r < 150 && (g < 200 || (r < 100 && g > 150 && b > 200))) return 4;
            return 5;
        }

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, {
                    type: 'array',
                    cellStyles: true
                });
                const worksheet = workbook.Sheets["予定表"];
                if (!worksheet) {
                    alert("「予定表」シートが見つかりませんでした。");
                    return;
                }
                const range = XLSX.utils.decode_range(worksheet['!ref']);
                let rawData = [];
                for (let r = range.s.r; r <= range.e.r; r++) {
                    const cellI = worksheet[XLSX.utils.encode_cell({ r: r, c: 8 })],
                        cellJ = worksheet[XLSX.utils.encode_cell({ r: r, c: 9 })],
                        cellK = worksheet[XLSX.utils.encode_cell({ r: r, c: 10 })],
                        cellL = worksheet[XLSX.utils.encode_cell({ r: r, c: 11 })],
                        cellQ = worksheet[XLSX.utils.encode_cell({ r: r, c: 16 })];
                    if (!cellI || !cellK) continue;
                    const q = cellI.v,
                        numVal = cellJ ? cellJ.v : 0,
                        num = isNaN(parseInt(numVal)) ? 0 : parseInt(numVal),
                        a = cellK.v,
                        l = cellL ? String(cellL.v).trim() : "",
                        qVal = cellQ ? cellQ.v : null,
                        practice = (qVal !== null && String(qVal).trim() === "0");
                    if (!q || !a || q === "問題文" || a === "解答") continue;
                    rawData.push({
                        q: q,
                        n: num,
                        a: a,
                        l: l,
                        practice: practice,
                        p: getColorPriority(cellI)
                    });
                }
                questions = rawData.sort((a, b) => (a.p !== b.p) ? a.p - b.p : a.n - b.n);
                if (questions.length === 0) {
                    alert("問題が見つかりませんでした。");
                    return;
                }
                startQuiz(true);
            };
            reader.readAsArrayBuffer(file);
        });

        function startQuiz(reset = true) {
            if (reset) {
                currentIndex = 0;
                results = [];
                clearProgress();
            }
            screenUpload.classList.remove('active');
            screenQuiz.classList.add('active');
            showQuestion();
        }

        function showQuestion() {
            if (!questions || questions.length === 0) return;
            const q = questions[currentIndex];
            progressText.innerText = `${currentIndex + 1} / ${questions.length}`;
            questionText.innerText = q.q;
            
            // 文字数に応じてフォントサイズを動的に変更
            const len = q.q.length;
            if (len < 15) {
                questionText.style.fontSize = "2.5rem";
            } else if (len < 30) {
                questionText.style.fontSize = "1.8rem";
            } else if (len < 60) {
                questionText.style.fontSize = "1.4rem";
            } else {
                questionText.style.fontSize = "1.1rem";
            }
            
            answerBox.innerText = "";
            backBtn.style.display = (currentIndex > 0) ? "block" : "none";

            if (q.practice) {
                // 練習モード：解答・解説を即表示
                checkBtn.style.display = "none";
                judgeContainer.style.display = "none";
                practiceAnswerBox.style.display = "block";
                practiceAnswerBox.innerText = q.a;
                if (q.l) {
                    practiceExplanationBox.style.display = "block";
                    practiceExplanationBox.innerText = q.l;
                } else {
                    practiceExplanationBox.style.display = "none";
                }
                practiceBtn.style.display = "block";
            } else {
                // 通常モード
                checkBtn.style.display = "block";
                judgeContainer.style.display = "none";
                practiceAnswerBox.style.display = "none";
                practiceExplanationBox.style.display = "none";
                practiceBtn.style.display = "none";
            }
        }

        checkBtn.addEventListener('click', () => {
            answerBox.innerText = questions[currentIndex].a;
            checkBtn.style.display = "none";
            judgeContainer.style.display = "flex";
        });

        practiceBtn.addEventListener('click', () => {
            recordResult('練習');
        });

        backBtn.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                results.pop();
                saveProgress();
                showQuestion();
            }
        });

        document.getElementById('maru-btn').addEventListener('click', () => recordResult('○'));
        document.getElementById('batsu-btn').addEventListener('click', () => recordResult('×'));

        function recordResult(judge) {
            results.push({
                a: questions[currentIndex].a,
                j: judge
            });
            currentIndex++;
            saveProgress();
            if (currentIndex < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            clearProgress();
            screenQuiz.classList.remove('active');
            screenResult.classList.add('active');
            let text = "";
            results.forEach(res => {
                text += `${res.a} ${res.j}\n`;
            });
            resultArea.innerText = text;
        }

        document.getElementById('line-btn').addEventListener('click', () => {
            const text = resultArea.innerText;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => {
                    openLine(text);
                }).catch(() => {
                    fallbackCopy(text);
                });
            } else {
                fallbackCopy(text);
            }
        });

        function fallbackCopy(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                openLine(text);
            } catch (e) {
                alert("コピー失敗");
            }
            document.body.removeChild(textArea);
        }

        function openLine(text) {
            window.location.href = `line://msg/text/${encodeURIComponent(text)}`;
            setTimeout(() => {
                alert("結果をコピーしました！LINEに貼り付けて送ってください。");
            }, 500);
        }

        document.getElementById('restart-btn').addEventListener('click', () => {
            if (confirm("最初から やりなおす？")) {
                screenResult.classList.remove('active');
                startQuiz(true);
            }
        });
    </script>
</body>
